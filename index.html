<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open API Project</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Open API Project</h1>
        <p id="status">Loading cities...</p>
        <form class="city-search" id="city-search" aria-label="Search city">
          <label for="city-input" class="sr-only">Search for a city</label>
          <input
            id="city-input"
            name="city"
            type="text"
            placeholder="Search for a city"
            autocomplete="off"
          />
          <button type="submit">Add City</button>
          <ul
            id="city-suggestions"
            class="city-suggestions"
            aria-label="City suggestions"
          ></ul>
        </form>
        <div id="undo-bar" class="undo-bar" hidden>
          <button id="undo-btn" type="button">Undo Delete</button>
        </div>
        <nav class="dataset-nav" aria-label="Data point navigation">
          <button
            type="button"
            class="dataset-btn active"
            data-dataset="weather"
          >
            Weather
          </button>
          <button type="button" class="dataset-btn" data-dataset="air-quality">
            Air Quality
          </button>
        </nav>
        <div class="unit-toggle" role="group" aria-label="Temperature unit">
          <button type="button" class="unit-btn active" data-unit="fahrenheit">
            Imperial
          </button>
          <button type="button" class="unit-btn" data-unit="celsius">
            Metric
          </button>
        </div>
      </header>
      <section class="cities" aria-label="City data list">
        <ul id="city-list" class="city-list"></ul>
      </section>
      <p class="note">
        Switch tabs to compare weather and air quality for each city.
      </p>
      <p class="credit">Developed by Javier Gusart</p>
    </main>
  </body>
</html>
