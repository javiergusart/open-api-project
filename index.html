<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Weather App</h1>
        <p id="status">Loading cities...</p>
        <div class="unit-toggle" role="group" aria-label="Temperature unit">
          <button type="button" class="unit-btn active" data-unit="fahrenheit">
            Imperial
          </button>
          <button type="button" class="unit-btn" data-unit="celsius">
            Metric
          </button>
        </div>
      </header>
      <section class="cities" aria-label="City weather list">
        <ul id="city-list" class="city-list"></ul>
      </section>
      <p class="note">
        Houston and Cartagena are live. More cities coming soon.
      </p>
      <p class="credit">Developed by Javier Gusart</p>
    </main>
  </body>
</html>
